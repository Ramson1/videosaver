version: "3.9"

services:
  # ─── NestJS API ────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: videosaver-api
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=debug
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - api_tmp:/app/tmp
    networks:
      - videosaver-net
    restart: unless-stopped

  # ─── Next.js Web ───────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: videosaver-web
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
    networks:
      - videosaver-net
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: videosaver-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - videosaver-net
    restart: unless-stopped

  # ─── Bull Board (Queue UI) ────────────────
  bull-board:
    image: deadly0/bull-board:latest
    container_name: videosaver-bullboard
    ports:
      - "3001:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - videosaver-net
    profiles:
      - tools

volumes:
  redis_data:
  api_tmp:

networks:
  videosaver-net:
    driver: bridge
